name: Publish to NuGet

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  publish:
    runs-on: windows-latest

    permissions:
      contents: read
      packages: write
      id-token: write   # required for GitHub OIDC token issuance

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output nupkg

      # Exchange the GitHub OIDC token for a short-lived NuGet API key
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: FSharpDeveloper   # your nuget.org username (profile name, not email)

      - name: Publish to NuGet.org
        run: dotnet nuget push "nupkg\*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
