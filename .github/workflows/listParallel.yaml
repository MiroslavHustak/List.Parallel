name: Publish to NuGet

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  publish:
    runs-on: windows-latest
    
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output nupkg

      - name: Publish to NuGet.org
        uses: nuget/publish@v2
        with:
          PROJECT_PATH: List.Parallel.fsproj
          NUGET_SOURCE: https://api.nuget.org/v3/index.json
          # Do NOT specify API_KEY — Trusted Publishing will be used automatically
