name: Publish to NuGet

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  publish:
    runs-on: windows-latest
    
    permissions:
      contents: read
      packages: write
      id-token: write # CRUCIAL: This allows the runner to request the OIDC token from GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output nupkg

      # FIX: We removed setup-nuget because the native dotnet CLI is preferred for OIDC.
      # We explicitly pass the system token generated via id-token: write permissions.
      - name: Publish to NuGet.org
        run: dotnet nuget push "nupkg\*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key OpenIdConnect --skip-duplicate
